services:
  postgres:
    image: postgres:16-alpine
    container_name: hi-dorri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hidorri
      POSTGRES_PASSWORD: hidorri
      POSTGRES_DB: hidorri
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hidorri -d hidorri"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
